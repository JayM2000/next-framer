<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="50%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#a16207" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <style>
      .vault-pulse {
        animation: pulse 2.5s infinite alternate ease-in-out;
      }
      .shackle-bounce {
        animation: bounce 4s infinite ease-in-out;
      }
      @keyframes pulse {
        0% { filter: drop-shadow(0 0 2px rgba(234, 179, 8, 0.4)); transform: scale(1); }
        100% { filter: drop-shadow(0 0 12px rgba(234, 179, 8, 0.8)); transform: scale(1.02); }
      }
      @keyframes bounce {
        0%, 15%, 85%, 100% { transform: translateY(0); }
        40%, 60% { transform: translateY(-8px); }
      }
    </style>
  </defs>
  
  <g class="vault-pulse" transform-origin="50 50">
    <!-- Shackle -->
    <path d="M 32 42 L 32 26 C 32 12, 68 12, 68 26 L 68 42" fill="none" stroke="url(#goldGradient)" stroke-width="12" stroke-linecap="round" class="shackle-bounce" />
    
    <!-- Vault Body -->
    <rect x="20" y="40" width="60" height="48" rx="12" fill="url(#goldGradient)" filter="url(#glow)"/>
    
    <!-- Keyhole -->
    <circle cx="50" cy="58" r="6" fill="#422006"/>
    <path d="M 47 62 L 53 62 L 51 74 L 49 74 Z" fill="#422006"/>
  </g>
</svg>
