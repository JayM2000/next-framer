name: CI and Deploy

on:
  push:
    branches: [master]

jobs:
  check-merge-source:
    name: Prevent direct push to master
    runs-on: ubuntu-latest

    steps:
      - name: Fail if master commit not from dev
        run: |
          echo "Checking merge source..."
          # Get the branch that triggered the push
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          # When committing directly to master (not merge), abort
          if [[ "${{ github.head_ref }}" == "master" ]]; then
            echo "Push directly to master detected."
            echo "Use pull requests from dev branch only."
            exit 1
          fi
          echo "Merge source OK."

  ci:
    name: CI & Deploy to Render
    runs-on: ubuntu-latest
    needs: check-merge-source

    steps:
      - name: Checkout code
        uses: actions/checkout@v4          # ✅ Fixed: v5 doesn't exist

      - name: Setup Node (no cache)
        uses: actions/setup-node@v4        # ✅ Upgraded to v4
        with:
          node-version: 22.x
          # ❌ No `cache: 'yarn'` — disables auto-caching

      - name: Clean previous dependencies  # ✅ Force fresh every time
        run: |
          rm -rf node_modules
          rm -rf .yarn/cache
          rm -rf .next

      - name: Install dependencies (fresh)
        run: yarn add --frozen-lockfile --prefer-offline false
        # --prefer-offline false = always fetch from registry, never local cache

      - name: Deploy to Render
        env:
          DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          echo "🚀 Triggering Render Deploy..."
          curl -X POST "$DEPLOY_HOOK_URL"